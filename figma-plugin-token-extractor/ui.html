<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Khipu Token Extractor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      line-height: 1.5;
      padding: 16px;
      background: #ffffff;
      color: #333;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #8347AD;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 16px 0 8px;
      color: #333;
    }

    .header {
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 16px;
    }

    .summary {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }

    .summary-item strong {
      color: #666;
    }

    .summary-item span {
      color: #333;
      font-weight: 600;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
    }

    .tab {
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      transition: all 0.2s;
    }

    .tab:hover {
      color: #8347AD;
    }

    .tab.active {
      color: #8347AD;
      border-bottom-color: #8347AD;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .json-output {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 11px;
      overflow-x: auto;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .color-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #f9f9f9;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
    }

    .color-info {
      flex: 1;
    }

    .color-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 2px;
    }

    .color-value {
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 11px;
      color: #666;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
    }

    button {
      flex: 1;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #8347AD;
      color: white;
    }

    .btn-primary:hover {
      background: #6d3a91;
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #d0d0d0;
    }

    .loading {
      text-align: center;
      padding: 32px;
      color: #666;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 8px 12px;
      border-radius: 4px;
      margin-top: 8px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">Extrayendo tokens...</div>
  </div>

  <script>
    let tokensData = null;

    // Escuchar mensajes del código principal
    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;

      if (msg.type === 'tokens-extracted') {
        tokensData = msg.data;
        renderUI();
      } else if (msg.type === 'error') {
        document.getElementById('app').innerHTML = `
          <div class="error">
            <strong>Error:</strong> ${msg.message}
          </div>
        `;
      }
    };

    function renderUI() {
      const { variables, styles, summary } = tokensData;

      document.getElementById('app').innerHTML = `
        <div class="header">
          <h1>Khipu Token Extractor</h1>
        </div>

        <div class="summary">
          <div class="summary-item">
            <strong>Colecciones de Variables:</strong>
            <span>${summary.totalCollections}</span>
          </div>
          <div class="summary-item">
            <strong>Total Variables:</strong>
            <span>${summary.totalVariables}</span>
          </div>
          <div class="summary-item">
            <strong>Estilos de Color:</strong>
            <span>${summary.totalStyles}</span>
          </div>
        </div>

        <div class="tabs">
          <button class="tab active" onclick="switchTab('json')">JSON Completo</button>
          <button class="tab" onclick="switchTab('colors')">Vista de Colores</button>
        </div>

        <div id="json-tab" class="tab-content active">
          <h2>JSON para copiar</h2>
          <div class="json-output" id="json-output"></div>
        </div>

        <div id="colors-tab" class="tab-content">
          <h2>Colores Primarios</h2>
          <div id="colors-preview"></div>
        </div>

        <div class="buttons">
          <button class="btn-primary" onclick="copyJSON()">Copiar JSON</button>
          <button class="btn-secondary" onclick="closePlugin()">Cerrar</button>
        </div>
      `;

      // Renderizar JSON
      document.getElementById('json-output').textContent = JSON.stringify(tokensData, null, 2);

      // Renderizar vista de colores
      renderColorPreview();
    }

    function renderColorPreview() {
      const container = document.getElementById('colors-preview');
      const { variables } = tokensData;
      let html = '';

      // Iterar sobre colecciones y buscar colores primarios
      Object.entries(variables.collections).forEach(([collectionName, collection]) => {
        Object.entries(collection.variables).forEach(([varName, varData]) => {
          if (varData.resolvedType === 'COLOR' && varName.toLowerCase().includes('primary')) {
            Object.entries(varData.values).forEach(([modeName, value]) => {
              if (value.hex) {
                html += `
                  <div class="color-preview">
                    <div class="color-swatch" style="background-color: ${value.hex}"></div>
                    <div class="color-info">
                      <div class="color-name">${varName} (${modeName})</div>
                      <div class="color-value">${value.hex} • rgba(${value.rgba.r}, ${value.rgba.g}, ${value.rgba.b}, ${value.rgba.a})</div>
                    </div>
                  </div>
                `;
              }
            });
          }
        });
      });

      container.innerHTML = html || '<p style="color: #999">No se encontraron colores primarios en las variables.</p>';
    }

    function switchTab(tabName) {
      // Actualizar tabs
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

      event.target.classList.add('active');
      document.getElementById(`${tabName}-tab`).classList.add('active');
    }

    async function copyJSON() {
      const json = JSON.stringify(tokensData, null, 2);

      try {
        await navigator.clipboard.writeText(json);
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = '✓ Copiado!';
        btn.style.background = '#2e7d32';

        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.background = '#8347AD';
        }, 2000);
      } catch (err) {
        alert('Error al copiar. Usa Ctrl/Cmd + C manualmente.');
      }
    }

    function closePlugin() {
      parent.postMessage({ pluginMessage: { type: 'close-plugin' } }, '*');
    }
  </script>
</body>
</html>
