<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locale Switcher - Khipu Design System</title>

    <!-- Material Symbols Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

    <!-- Public Sans Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap">

    <!-- Khipu BeerCSS Bundle -->
    <link rel="stylesheet" href="/dist/beercss/khipu-beercss.min.css">
</head>
<body class="light">

    <!-- Navbar with Locale Switcher -->
    <nav class="primary">
        <div class="kds-container-center max-w-1200">
            <!-- Logo -->
            <a href="#" class="kds-navbar-brand">Khipu</a>

            <!-- Locale Switcher -->
            <div class="kds-locale-switcher" id="localeSwitcher">
                <button class="kds-locale-switcher-toggle" onclick="toggleLocale()">
                    <span class="kds-locale-flag">🇨🇱</span>
                    <span>Chile</span>
                    <i class="material-symbols-outlined kds-locale-arrow">expand_more</i>
                </button>
                <div class="kds-locale-switcher-menu">
                    <button class="active" onclick="selectLocale('🇨🇱', 'Chile', 'es-CL')">
                        <span class="kds-locale-flag">🇨🇱</span>
                        Chile
                    </button>
                    <button onclick="selectLocale('🇦🇷', 'Argentina', 'es-AR')">
                        <span class="kds-locale-flag">🇦🇷</span>
                        Argentina
                    </button>
                    <button onclick="selectLocale('🇵🇪', 'Perú', 'es-PE')">
                        <span class="kds-locale-flag">🇵🇪</span>
                        Perú
                    </button>
                    <button onclick="selectLocale('🇨🇴', 'Colombia', 'es-CO')">
                        <span class="kds-locale-flag">🇨🇴</span>
                        Colombia
                    </button>
                    <button onclick="selectLocale('🇲🇽', 'México', 'es-MX')">
                        <span class="kds-locale-flag">🇲🇽</span>
                        México
                    </button>
                    <button onclick="selectLocale('🇧🇷', 'Brasil', 'pt-BR')">
                        <span class="kds-locale-flag">🇧🇷</span>
                        Brasil
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Demo: Pre-login page with centered stage -->
    <div class="kds-stage-centered">
        <div class="kds-stage-content narrow">
            <article class="kds-card-elevated kds-p-5">
                <div class="kds-card-body">
                    <h2>Iniciar sesión</h2>

                    <!-- Email -->
                    <div class="field label border">
                        <input type="email" id="email" name="email" value="" placeholder=" ">
                        <label for="email">Correo electrónico</label>
                    </div>

                    <!-- Password -->
                    <div class="field label border">
                        <input type="password" id="password" name="password" value="" placeholder=" ">
                        <label for="password">Contraseña</label>
                    </div>

                    <!-- Forgot password -->
                    <a href="#" class="kds-link kds-mt-2">¿Olvidaste tu contraseña?</a>

                    <!-- Submit -->
                    <div class="kds-mt-2">
                        <button class="kds-btn kds-btn-primary kds-btn-block">
                            Iniciar sesión
                        </button>
                    </div>

                    <!-- Separator -->
                    <div class="kds-divider-text"><span>o</span></div>

                    <!-- Google Sign-In (official branding guidelines) -->
                    <!-- SVG paths: from official signin-assets.zip -->
                    <!-- https://developers.google.com/identity/branding-guidelines -->
                    <button class="kds-btn-google">
                        <span class="kds-google-icon">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M19.6 10.227c0-.709-.064-1.39-.182-2.045H10v3.868h5.382a4.6 4.6 0 0 1-1.996 3.018v2.51h3.232c1.891-1.742 2.982-4.305 2.982-7.35z" fill="#4285F4"/>
                                <path d="M10 20c2.7 0 4.964-.895 6.618-2.423l-3.232-2.509c-.896.6-2.041.955-3.386.955-2.605 0-4.81-1.76-5.596-4.123H1.064v2.59A9.996 9.996 0 0 0 10 20z" fill="#34A853"/>
                                <path d="M4.404 11.9c-.2-.6-.314-1.24-.314-1.9 0-.66.114-1.3.314-1.9V5.51H1.064A9.996 9.996 0 0 0 0 10c0 1.614.386 3.14 1.064 4.49L4.404 11.9z" fill="#FBBC04"/>
                                <path d="M10 3.977c1.468 0 2.786.505 3.823 1.496l2.868-2.868C14.959.99 12.695 0 10 0 6.09 0 2.71 2.24 1.064 5.51l3.34 2.59c.787-2.364 2.991-4.123 5.596-4.123z" fill="#EA4335"/>
                            </svg>
                        </span>
                        Iniciar sesión con Google
                    </button>

                    <!-- Register link -->
                    <p class="kds-text-muted kds-text-center body-small kds-mt-2">
                        ¿No tienes cuenta? <a href="#">Regístrate aquí</a>
                    </p>
                </div>
            </article>
        </div>
    </div>

    <!-- Footer with white links on purple background -->
    <footer class="primary">
        <div class="kds-text-center">
            <p>&copy; 2026 Khipu. Todos los derechos reservados.</p>
            <p class="kds-text-sm kds-mt-1">
                <a href="#">Términos y condiciones</a> &bull;
                <a href="#">Política de privacidad</a>
            </p>
        </div>
    </footer>

    <script>
        // Locale Switcher
        function toggleLocale() {
            document.getElementById('localeSwitcher').classList.toggle('active');
        }

        function selectLocale(flag, name, locale) {
            const switcher = document.getElementById('localeSwitcher');
            const toggle = switcher.querySelector('.kds-locale-switcher-toggle');

            // Update toggle display
            toggle.querySelector('.kds-locale-flag').textContent = flag;
            toggle.querySelector('span:not(.kds-locale-flag)').textContent = name;

            // Update active state in menu
            switcher.querySelectorAll('.kds-locale-switcher-menu button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Close menu
            switcher.classList.remove('active');

            console.log('Locale changed to:', locale);
        }

        // Close locale menu on outside click
        document.addEventListener('click', function(e) {
            const switcher = document.getElementById('localeSwitcher');
            if (!switcher.contains(e.target)) {
                switcher.classList.remove('active');
            }
        });
    </script>
</body>
</html>
